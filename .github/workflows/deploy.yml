name: Deploy to Production

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false   # never cancel a running deploy; queue instead

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production    # optional: gate with required reviewers in GitHub settings

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true          # abort on first failed command
          script: |
            set -euo pipefail
            cd /root/admin-frontend

            echo "=== Pulling latest changes ==="
            git fetch --prune origin
            git reset --hard origin/main

            echo "=== Running deploy script ==="
            bash deploy.sh
